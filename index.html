<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Management System</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --light: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--light);
            margin: 0;
            color: var(--dark);
        }

        /* Navigation */
        nav {
            background: var(--dark);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }

        nav .nav-links button {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 4px;
        }

        /* Container & Page Logic */
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .page {
            display: none;
        }

        .active {
            display: block;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button.main-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        button.main-btn:hover {
            opacity: 0.9;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8fafc;
            color: var(--secondary);
        }

        .badge {
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.8rem;
            background: #dcfce7;
            color: #166534;
            margin-right: 5px;
        }

        .admin-controls {
            background: #fef2f2;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border: 1px solid #fee2e2;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo" onclick="showPage('home')">ExamPortal</div>
        <div class="nav-links" id="nav-links">
        </div>
    </nav>

    <div class="container">

        <section id="home" class="page">
            <h2>Exam Timetable</h2>
            <div id="timetable-filter">
                <p>Viewing all scheduled exams for current levels and sections.</p>
            </div>
            <table id="exam-table">
                <thead>
                    <tr>
                        <th>Course</th>
                        <th>Classification</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="exam-body"></tbody>
            </table>
        </section>

        <section id="login" class="page">
            <h2>Login</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-user">
            </div>
            <button class="main-btn" onclick="handleLogin()">Sign In</button>
            <p>Don't have an account? <a href="#" onclick="showPage('register')">Register here</a></p>
        </section>

        <section id="register" class="page">
            <h2>Register New User</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-user">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="reg-role">
                    <option value="student">Student</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            <button class="main-btn" onclick="handleRegister()">Create Account</button>
        </section>

        <section id="admin" class="page">
            <div class="admin-controls">
                <h2>Admin: Schedule New Exam</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Course Name</label>
                        <input type="text" id="ex-name">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="ex-date">
                    </div>
                    <div class="form-group">
                        <label>Level</label>
                        <select id="ex-level">
                            <option>100</option>
                            <option>200</option>
                            <option>300</option>
                            <option>400</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Semester</label>
                        <select id="ex-sem">
                            <option>First</option>
                            <option>Second</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Section</label>
                        <input type="text" id="ex-sec" placeholder="e.g. A, B, or C">
                    </div>
                </div>
                <button class="main-btn" onclick="addExam()">Post Exam to Timetable</button>
            </div>
        </section>

    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */

        // Data Storage (Local Storage)
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let exams = JSON.parse(localStorage.getItem('exams')) || [];
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;

        // Page Navigation
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            updateNav();
            if (pageId === 'home') renderTimetable();
        }

        function updateNav() {
            const nav = document.getElementById('nav-links');
            if (currentUser) {
                nav.innerHTML = `
                    <span>Welcome, <b>${currentUser.username}</b></span>
                    ${currentUser.role === 'admin' ? '<button onclick="showPage(\'admin\')">Admin Panel</button>' : ''}
                    <button onclick="logout()">Logout</button>
                `;
            } else {
                nav.innerHTML = `
                    <button onclick="showPage('login')">Login</button>
                    <button onclick="showPage('register')">Register</button>
                `;
            }
        }

        // Auth Functions
        function handleRegister() {
            const username = document.getElementById('reg-user').value;
            const role = document.getElementById('reg-role').value;
            if (!username) return alert("Enter username");

            users.push({ username, role });
            localStorage.setItem('users', JSON.stringify(users));
            alert("Registration successful! Please login.");
            showPage('login');
        }

        function handleLogin() {
            const userIn = document.getElementById('login-user').value;
            const user = users.find(u => u.username === userIn);

            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showPage('home');
            } else {
                alert("User not found. Please register.");
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            showPage('home');
        }

        // Exam Functions
        function addExam() {
            const newExam = {
                id: Date.now(),
                course: document.getElementById('ex-name').value,
                date: document.getElementById('ex-date').value,
                level: document.getElementById('ex-level').value,
                semester: document.getElementById('ex-sem').value,
                section: document.getElementById('ex-sec').value
            };

            if (!newExam.course || !newExam.date) return alert("Fill course name and date");

            exams.push(newExam);
            localStorage.setItem('exams', JSON.stringify(exams));
            alert("Exam Added!");
            showPage('home');
        }

        function deleteExam(id) {
            exams = exams.filter(e => e.id !== id);
            localStorage.setItem('exams', JSON.stringify(exams));
            renderTimetable();
        }

        function renderTimetable() {
            const body = document.getElementById('exam-body');
            body.innerHTML = '';

            exams.forEach(ex => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${ex.course}</b></td>
                    <td>
                        <span class="badge">Lvl ${ex.level}</span>
                        <span class="badge">${ex.semester} Sem</span>
                        <span class="badge">Sec ${ex.section}</span>
                    </td>
                    <td>${ex.date}</td>
                    ${currentUser && currentUser.role === 'admin' ?
                        `<td><button onclick="deleteExam(${ex.id})" style="color:red; cursor:pointer; background:none; border:none;">[Remove]</button></td>` : ''}
                `;
                body.appendChild(tr);
            });
        }

        // Initialize App
        showPage('home');
    </script>
</body>

</html>
